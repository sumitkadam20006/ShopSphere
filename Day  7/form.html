    <h1>MECB Application Form</h1>
    <div class="form-group">
        <label>Registration No.</label>
        <input type="number">
    </div>
    <div class="form-group">
        <label>Date</label>
        <input type="date">
    </div>
    <h2>Applicant Details</h2>
    <div class="row">
        <div class="form-group">
            <label>First Name</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Middle Name</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Surname</label>
            <input type="text">
        </div>
    </div>
    <div class="form-group">
        <label>Occupation / Designation</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label>Address</label>
        <textarea rows="4"></textarea>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Village / City</label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Pin Code</label>
            <input type="text">
        </div>
    </div>
    <div class="row">
        <div class="form-group">
            <label>Email</label>
            <input type="email">
        </div>
        <div class="form-group">
            <label>Mobile No.</label>
            <input type="tel">
        </div>
    </div>
    <div class="form-group">
        <label>Existing Consumer No.</label>
        <input type="text">
    </div>
    <h2>Type of Premises</h2>
        <div class="checkbox-group">
        <label><input type="checkbox"> Owned</label>
        <label><input type="checkbox"> Rented</label>
        <label><input type="checkbox"> Lease</label>
        <label><input type="checkbox"> Other</label>
    </div>
    <h2>Owner Details</h2>
    <div class="form-group">
        <label>Owner Name</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label>Owner Address</label>
        <textarea rows="3"></textarea>
    </div>
 <button type="submit">Submit Application</button>
</div>

<!--
<section> and <article> are both semantic HTML elements but serve different purposes.

<section> is used to group related content under a common theme within a page.

<article> is used for content that can stand alone and be reused or published
independently, such as a blog post, news article, forum post, or product review.

Example:
Use <section> for the "Skills" section of a portfolio website.
Use <article> for an individual blog post on that website.

Mental test:
Ask yourself, "Could this content be copied to another website or RSS feed and
still make sense on its own?"

If YES → use <article>.
If NO → use <section>.
-->

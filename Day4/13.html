<!--
Semantic HTML helps SEO because search engines can better understand the
structure and meaning of a webpage.

1. <nav>
Google recognizes navigation menus and understands which links are part
of site navigation. A generic div provides no such meaning.

2. <main>
Google can identify the primary content of the page and prioritize it
for indexing. A div does not indicate which content is most important.

3. <h1>
Google uses the h1 element to understand the main topic of the page.
A div styled to look like a heading does not provide this information.

Semantic tags improve accessibility, content organization, and search
engine understanding, resulting in better SEO performance.
-->

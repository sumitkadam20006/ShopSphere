<!--
<ul> creates an unordered (bulleted) list.
<ol> creates an ordered (numbered or lettered) list.

Use <ul> when order does not matter, such as a website navigation menu.
Example: Home, About, Services, Contact.

Use <ol> when order matters.
Example: Steps to install software.

Navigation menus usually use <ul type="none"> or CSS list-style:none
instead of removing the <ul> because the menu is still a list of related
navigation links. This preserves semantic meaning and improves accessibility.
-->

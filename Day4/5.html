<!--
<th> defines a table header cell.
<td> defines a normal table data cell.

<th> should be used for headings because it provides semantic meaning,
not just bold text.

Making a <td> bold with CSS only changes appearance and does not tell
assistive technologies that it is a header.

Screen readers announce <th> as a header and associate it with the
related row or column data. A bold <td> is treated as ordinary data.
This improves accessibility and table navigation.
-->

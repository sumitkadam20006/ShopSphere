<!--
GET sends form data in the URL.
Example:
https://example.com/search?name=Sumit&city=Pune

POST sends form data in the request body.

GET:
- Data visible in URL
- Can be bookmarked
- Limited length
- Less secure for sensitive data

POST:
- Data not shown in URL
- Better for sensitive information
- No practical URL length limits

Never use GET for login forms because usernames and passwords may become
visible in the browser history, bookmarks, server logs, and shared URLs.
POST is the safer choice for authentication forms.
-->

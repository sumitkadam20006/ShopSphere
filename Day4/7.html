<!--
<label for="id"> is important because it connects the label with the
form control.

Accessibility:
Screen readers can correctly identify and announce the field label,
helping users understand what information is required.

User Experience:
Clicking the label focuses the related input, making forms easier to use.

Placeholder text is not a replacement for labels because placeholders
disappear when users start typing. Users may forget what information
the field requires, while labels remain visible at all times.
-->
